<div class="max-w-4xl mx-auto p-6 bg-gray-900 text-gray-100">
    <h1 class="text-2xl font-bold text-emerald-400 mb-6">📚 ტექნიკური ბიბლიოთეკა</h1>
    
    <!-- წიგნების სია (კატალოგი) -->
    <div class="space-y-4">
        <!-- წიგნი 1 -->
        <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700">
            <button onclick="toggleBook('book1')" class="w-full text-left p-4 font-bold flex justify-between items-center hover:bg-gray-700 transition">
                <span>1. თ. მუსელიანი - ელექტრომოწყობილობათა ტექნიკური დიაგნოსტიკა (II ნაწილი)</span>
                <span id="icon1">▼</span>
            </button>
            <div id="book1" class="hidden p-4 bg-gray-900 border-t border-gray-700">
                <div class="flex gap-4 mb-4">
                    <a href="თ. მუსელიანი,,ელექტრომოწობილობათა ტექნიკური დიაგნოსტიკა 2 ნაწილი.pdf" target="_blank" class="bg-blue-600 px-4 py-2 rounded text-sm hover:bg-blue-500">📄 სრული PDF-ის გახსნა</a>
                </div>
                <!-- აქ გაიხსნება მოკლე კატალოგი ან თავები -->
                <div class="text-sm text-gray-400 space-y-2">
                    <p>სწრაფი წვდომა თავებზე:</p>
                    <ul class="list-disc pl-5">
                        <li class="hover:text-amber-400 cursor-pointer">I თავი: მაღალი ძაბვის აპარატურა</li>
                        <li class="hover:text-amber-400 cursor-pointer">II თავი: ამომრთველების დიაგნოსტიკა</li>
                        <li class="hover:text-amber-400 cursor-pointer">III თავი: ტრანსფორმატორები</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleBook(id) {
        const content = document.getElementById(id);
        content.classList.toggle('hidden');
        document.getElementById('icon1').innerText = content.classList.contains('hidden') ? '▼' : '▲';
    }
</script>
